apiVersion: v1
kind: Namespace
metadata:
  name: disease-predictor

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-config
  namespace: disease-predictor
data:
  streamlit.toml: |
    [server]
    port = 8501
    headless = true
    runOnSave = false
    
    [client]
    toolbarMode = "viewer"
    
    [logger]
    level = "info"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: disease-predictor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-predictor
  namespace: disease-predictor
  labels:
    app: disease-predictor
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: disease-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: disease-predictor
        version: v1
    spec:
      containers:
      - name: disease-predictor
        image: disease-predictor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
          protocol: TCP
        
        # Resource requests and limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: model
          mountPath: /app/model
        - name: config
          mountPath: /app/.streamlit
        
        # Environment variables
        env:
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
      
      # Volumes
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
      - name: model
        emptyDir: {}
      - name: config
        configMap:
          name: streamlit-config

---
apiVersion: v1
kind: Service
metadata:
  name: disease-predictor-service
  namespace: disease-predictor
  labels:
    app: disease-predictor
spec:
  type: LoadBalancer
  selector:
    app: disease-predictor
  ports:
  - name: http
    port: 80
    targetPort: 8501
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: disease-predictor-hpa
  namespace: disease-predictor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: disease-predictor
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: disease-predictor-netpolicy
  namespace: disease-predictor
spec:
  podSelector:
    matchLabels:
      app: disease-predictor
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: disease-predictor
    ports:
    - protocol: TCP
      port: 8501
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 53
