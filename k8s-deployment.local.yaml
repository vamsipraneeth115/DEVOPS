apiVersion: v1
kind: Namespace
metadata:
  name: disease-predictor

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-config
  namespace: disease-predictor
data:
  streamlit.toml: |
    [server]
    port = 8502
    headless = true
    runOnSave = false

    [client]
    toolbarMode = "viewer"

    [logger]
    level = "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-predictor
  namespace: disease-predictor
  labels:
    app: disease-predictor
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: disease-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: disease-predictor
        version: v1
    spec:
      containers:
      - name: disease-predictor
        image: disease-predictor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8502
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8502
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8502
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: config
          mountPath: /app/.streamlit
        env:
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_SERVER_PORT
          value: "8502"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
      volumes:
      - name: config
        configMap:
          name: streamlit-config

---
apiVersion: v1
kind: Service
metadata:
  name: disease-predictor-service
  namespace: disease-predictor
  labels:
    app: disease-predictor
spec:
  type: LoadBalancer
  selector:
    app: disease-predictor
  ports:
  - name: http
    port: 80
    targetPort: 8502
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: disease-predictor-hpa
  namespace: disease-predictor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: disease-predictor
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
