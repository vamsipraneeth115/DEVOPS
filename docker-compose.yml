version: '3.8'

services:
  disease-predictor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disease-predictor-app
    ports:
      - "8502:8502"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8502
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    networks:
      - disease-network

networks:
  disease-network:
    driver: bridge
